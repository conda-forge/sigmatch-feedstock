schema_version: 1

context:
  version: "0.0.9"

package:
  name: sigmatch
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sigmatch/sigmatch-${{ version }}.tar.gz
  sha256: d9ed5da484297f5faa97c8f534a41a9ba5d34e96ea6d776a0d536f430501c59f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - printo >=0.0.22

tests:
  - python:
      imports:
        - sigmatch
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A quick way to verify function signatures in Python
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/sigmatch/
  repository: https://github.com/mutating/sigmatch

extra:
  recipe-maintainers:
    - thewchan
